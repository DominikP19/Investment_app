{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Add Transaction{% endblock %}</h1>
{% endblock %}

{% block content %}
    <form method="post" action="{{ url_for('data_import.import_asset_manual') }}" class="add-form">
        <input type="text" name="name" placeholder="Investment name" required>
        <input type="number" step="0.01" name="amount" placeholder="Initial Amount" required>
        <input type="number" step="0.01" name="current_value" placeholder="Current Value" required>
        <input type="text" name="inv_type" placeholder="Type (stock, bond, etc)">
        <button type="submit">Add</button>
    </form>
{% endblock %}
